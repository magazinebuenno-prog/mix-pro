<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mixbarato - Sistema Administrativo</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>tailwind.config={theme:{extend:{colors:{mixbarato:'#EAB308',darkness:'#09090b',metal:'#27272a',success:'#22c55e',danger:'#ef4444',mixgreen:'#16a34a',mixyellow:'#facc15'},animation:{'fade-in':'fadeIn 0.3s ease-out','slide-up':'slideUp 0.4s ease-out','bounce-soft':'bounceSoft 2s infinite'},keyframes:{fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideUp:{'0%':{transform:'translateY(20px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},bounceSoft:{'0%, 100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-5px)'}}}}}}</script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>html{scroll-behavior:smooth}.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}.product-card{transition:all 0.3s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d}.product-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 40px -10px rgba(234,179,8,0.3)}#admin-panel{display:none}body.admin-mode #admin-panel{display:block}body.admin-mode .admin-only{display:flex!important}.admin-only{display:none!important}.hero-gradient{background:linear-gradient(135deg,rgba(9,9,11,0.95) 0%,rgba(22,163,74,0.3) 50%,rgba(234,179,8,0.2) 100%),url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1920');background-size:cover;background-position:center;background-attachment:fixed}.glass-panel{background:rgba(39,39,42,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1)}.input-field{background:rgba(9,9,11,0.8);border:1px solid rgba(255,255,255,0.1);transition:all 0.3s}.input-field:focus{border-color:#EAB308;box-shadow:0 0 0 3px rgba(234,179,8,0.1);outline:none}.btn-primary{background:linear-gradient(135deg,#16a34a 0%,#EAB308 100%);transition:all 0.3s}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 25px -5px rgba(234,179,8,0.4)}.category-pill{transition:all 0.3s}.category-pill.active{background:linear-gradient(135deg,#16a34a 0%,#EAB308 100%);color:white;transform:scale(1.05)}.image-upload-zone{border:2px dashed rgba(234,179,8,0.3);transition:all 0.3s;cursor:pointer}.image-upload-zone:hover,.image-upload-zone.dragover{border-color:#EAB308;background:rgba(234,179,8,0.05)}.toast{position:fixed;bottom:100px;right:20px;z-index:100;animation:slideUp 0.3s ease-out}.cart-active-padding{padding-bottom:180px!important}.stock-badge{position:absolute;top:12px;right:12px;z-index:10}.quick-actions{position:absolute;top:12px;left:12px;display:flex;gap:8px;opacity:0;transform:translateY(-10px);transition:all 0.3s;z-index:10}.product-card:hover .quick-actions{opacity:1;transform:translateY(0)}#cart-modal{align-items:flex-start;padding-top:20px;padding-bottom:20px}#cart-modal .modal-container{max-height:calc(100vh - 40px);height:auto;display:flex;flex-direction:column;margin:auto;width:100%;max-width:600px}#cart-items{overflow-y:auto;flex:1 1 auto;min-height:100px;max-height:calc(100vh - 400px)}.hero-title{font-size:clamp(3rem,15vw,8rem);line-height:0.85;letter-spacing:-0.02em}.carousel-container{position:relative;width:100%;height:400px;overflow:hidden;border-radius:1rem;background:#18181b}.carousel-slide{display:none;width:100%;height:100%;justify-content:center;align-items:center;cursor:zoom-in}.carousel-slide.active{display:flex}.carousel-slide img{max-width:100%;max-height:100%;object-fit:contain;transition:transform 0.3s ease}.carousel-slide.zoomed img{transform:scale(2);cursor:zoom-out}.carousel-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.7);color:white;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;z-index:10}.carousel-nav:hover{background:#EAB308;color:black}.carousel-prev{left:10px}.carousel-next{right:10px}.carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}.carousel-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.3s}.carousel-dot.active{background:#EAB308;transform:scale(1.2)}.thumbnail-container{display:flex;gap:10px;margin-top:10px;overflow-x:auto;padding:5px}.thumbnail{width:80px;height:80px;border-radius:0.5rem;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:all 0.3s;flex-shrink:0}.thumbnail:hover,.thumbnail.active{border-color:#EAB308;transform:scale(1.05)}.multi-upload-preview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.preview-item{position:relative;aspect-ratio:1;border-radius:0.5rem;overflow:hidden;border:2px solid #27272a}.preview-item img{width:100%;height:100%;object-fit:cover}.preview-item .remove-btn{position:absolute;top:5px;right:5px;background:rgba(239,68,68,0.9);color:white;border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}.upload-tabs{display:flex;gap:10px;margin-bottom:15px}.upload-tab{padding:8px 16px;background:#27272a;border:1px solid #3f3f46;border-radius:0.5rem;color:#a1a1aa;cursor:pointer;transition:all 0.3s;font-size:0.875rem;font-weight:600}.upload-tab.active{background:#EAB308;color:black;border-color:#EAB308}.link-input-container{display:none}.link-input-container.active{display:block}.file-upload-container{display:none}.file-upload-container.active{display:block}.share-btn{position:absolute;top:12px;right:50px;background:#25D366;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(-10px);transition:all 0.3s;z-index:10;border:2px solid rgba(255,255,255,0.2)}#product-modal .modal-container{max-height:calc(100vh - 40px);height:auto;display:flex;flex-direction:column;margin:auto;width:100%;max-width:900px}</style></head><body class="bg-darkness text-zinc-100 font-sans antialiased"><section id="home" class="hero-gradient min-h-screen flex flex-col justify-center items-center text-center px-4 relative overflow-hidden"><div class="absolute inset-0 bg-gradient-to-b from-transparent via-darkness/50 to-darkness"></div><div class="relative z-10 max-w-4xl mx-auto animate-slide-up w-full"><div class="inline-flex items-center gap-2 bg-mixbarato/20 border border-mixbarato/50 text-mixbarato text-xs font-black px-4 py-2 rounded-full mb-6 animate-bounce-soft uppercase tracking-widest"><i class="fas fa-map-marker-alt"></i> Rio de Janeiro</div><h1 class="hero-title font-black italic text-white mb-6 select-none"><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixgreen to-mixyellow uppercase">Mix</span><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixyellow to-mixgreen uppercase">Barato</span></h1><p class="mt-4 text-zinc-300 max-w-lg mx-auto font-medium text-base md:text-lg leading-relaxed px-4">Variedades com preços imbatíveis no seu WhatsApp!</p><div class="mt-10 flex flex-wrap justify-center gap-4"><a href="#catalogo" class="btn-primary text-white font-black px-8 md:px-12 py-4 md:py-5 rounded-2xl shadow-2xl uppercase italic flex items-center gap-2 md:gap-3 text-base md:text-lg"><i class="fas fa-shopping-bag text-xl md:text-2xl"></i> Ver Catálogo</a></div></div></section><section id="admin-panel" class="bg-zinc-900/95 border-y border-mixbarato/30 p-6 backdrop-blur-xl"><div class="container mx-auto max-w-7xl"><div class="flex justify-between items-center mb-8"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-gradient-to-br from-mixgreen to-mixbarato rounded-xl flex items-center justify-center"><i class="fas fa-cog text-white text-xl"></i></div><div><h2 class="text-mixbarato font-black uppercase italic text-2xl" id="admin-greeting">Painel Admin</h2><p class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Mixbarato Supabase</p></div></div><button onclick="logoutAdmin()" class="bg-zinc-800 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold uppercase transition-all flex items-center gap-2">Sair</button></div><div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><div class="lg:col-span-3 glass-panel p-6 rounded-2xl"><div class="flex items-center gap-2 mb-4 text-zinc-400"><i class="fas fa-tags"></i><p class="text-xs font-bold uppercase">Categorias</p></div><div class="flex gap-2 mb-4"><input type="text" id="new-cat-name" placeholder="Nova categoria..." class="input-field flex-1 p-3 rounded-lg text-sm text-white"> <button onclick="addCategory()" class="bg-mixbarato text-black px-4 rounded-lg font-bold"><i class="fas fa-plus"></i></button></div><div id="admin-cats-list" class="flex flex-wrap gap-2 max-h-48 overflow-y-auto no-scrollbar"></div></div><div class="lg:col-span-9 glass-panel p-6 rounded-2xl"><div class="flex items-center gap-2 mb-6 text-zinc-400"><i class="fas fa-box-open"></i><p class="text-xs font-bold uppercase" id="form-title">Novo Produto</p></div><form id="admin-form" class="space-y-4"><input type="hidden" id="edit-product-id" value=""><div class="grid grid-cols-2 gap-4"><div class="col-span-2"><input type="text" id="new-p-name" placeholder="Nome do Produto *" class="input-field w-full p-4 rounded-lg text-white font-medium" required></div><div><input type="number" id="new-p-price" placeholder="Preço (R$) *" step="0.01" min="0" class="input-field w-full p-4 rounded-lg text-white" required></div><div><select id="new-p-cat" class="input-field w-full p-4 rounded-lg text-white bg-zinc-900" required><option value="">Carregando...</option></select></div><div class="col-span-2"><textarea id="new-p-desc" placeholder="Descrição..." rows="2" class="input-field w-full p-4 rounded-lg text-white resize-none"></textarea></div><div class="col-span-2"><label class="font-bold text-xs text-zinc-500 uppercase mb-2 block">Imagens (Máx 4)</label><div class="file-upload-container active"><div class="image-upload-zone rounded-lg p-4 text-center relative" onclick="document.getElementById('image-input').click()"><input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageSelect(event)" multiple><div id="upload-placeholder"><i class="fas fa-cloud-upload-alt text-3xl text-mixbarato mb-2"></i><p class="text-sm text-zinc-400">Clique para subir imagens</p></div><div id="multi-upload-preview" class="multi-upload-preview hidden"></div></div></div></div><div class="col-span-2 flex gap-3"><button type="button" onclick="clearForm()" class="flex-1 bg-zinc-800 text-white py-4 rounded-lg font-bold uppercase text-sm">Limpar</button><button type="submit" class="flex-[2] btn-primary text-white py-4 rounded-lg font-black uppercase text-sm flex items-center justify-center gap-2" id="submit-btn"><i class="fas fa-save"></i> Salvar no Banco</button></div></div></form></div></div></div></section><div id="catalogo" class="min-h-screen bg-gradient-to-b from-darkness to-zinc-900"><header class="sticky top-0 z-40 bg-darkness/95 backdrop-blur-xl border-b border-zinc-800 shadow-2xl"><div class="container mx-auto px-4 py-4"><div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-br from-mixgreen to-mixbarato rounded-lg flex items-center justify-center"><i class="fas fa-shopping-bag text-white"></i></div><div><h1 class="text-2xl font-black italic tracking-tighter text-white"><span class="text-mixbarato">MIX</span>BARATO</h1></div></div><button onclick="loginAdmin()" class="text-zinc-600 hover:text-mixbarato transition-colors p-2 rounded-lg"><i class="fas fa-user-shield text-xl"></i></button></div><div class="relative mb-4"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i><input type="text" id="search-input" oninput="renderProducts()" placeholder="Buscar produto..." class="w-full bg-zinc-900/80 border border-zinc-800 p-4 pl-12 rounded-xl text-white outline-none focus:border-mixbarato text-sm"></div><nav id="dynamic-nav" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></nav></div></header><main id="main-content" class="container mx-auto px-4 py-8"><div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div><div id="empty-state" class="hidden text-center py-20"><h3 class="text-xl font-bold text-white mb-2">Nenhum produto encontrado</h3></div></main></div><div id="cart-button" class="fixed bottom-6 left-0 right-0 px-4 z-40 hidden animate-slide-up"><button onclick="openModal()" class="w-full max-w-md mx-auto btn-primary text-white py-4 rounded-2xl shadow-2xl flex justify-between items-center px-8"><span class="font-black flex items-center gap-3 uppercase tracking-tighter text-lg"><div class="relative"><i class="fas fa-shopping-basket text-xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-white text-black text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span></div>Pedido</span><span id="cart-total-badge" class="bg-white text-black px-4 py-2 rounded-lg font-black">R$ 0,00</span></button></div><div id="cart-modal" class="fixed inset-0 bg-black/90 z-50 hidden overflow-y-auto"><div class="modal-container bg-zinc-900 rounded-3xl border border-zinc-700 shadow-2xl mx-auto flex flex-col"><div class="p-5 border-b border-zinc-800 flex justify-between items-center"><h2 class="text-xl font-black text-mixbarato">MEU PEDIDO</h2><button onclick="closeModal()" class="text-zinc-500 text-2xl">&times;</button></div><div id="cart-items" class="p-4 space-y-3 bg-zinc-900/30 overflow-y-auto"></div><div class="p-5 bg-zinc-950 border-t border-zinc-800 space-y-3 shrink-0"><div class="flex justify-between items-center"><span id="cart-total-modal" class="text-2xl font-black text-white">R$ 0,00</span><button onclick="clearCart()" class="text-zinc-500 uppercase text-xs font-bold">Limpar</button></div><button onclick="sendOrder()" class="w-full bg-green-600 text-white py-3 rounded-xl font-black uppercase italic shadow-lg">Enviar via WhatsApp</button></div></div></div><div id="product-modal" class="fixed inset-0 bg-black/95 z-50 hidden overflow-y-auto"><div class="modal-container bg-zinc-900 rounded-3xl border border-zinc-700 shadow-2xl mx-auto flex flex-col"><div class="p-5 border-b border-zinc-800 flex justify-between items-center"><h2 class="text-xl font-black text-mixbarato" id="modal-product-name"></h2><button onclick="closeProductModal()" class="text-zinc-500 text-2xl">&times;</button></div><div class="p-6 space-y-6 overflow-y-auto"><div class="relative"><div class="carousel-container" id="carousel-container"></div><button class="carousel-nav carousel-prev" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button><button class="carousel-nav carousel-next" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button><div class="carousel-dots" id="carousel-dots"></div></div><div class="thumbnail-container" id="thumbnail-container"></div><div class="space-y-4"><div class="flex justify-between items-start"><div><span class="text-xs text-zinc-500 uppercase font-bold">Código</span><p class="text-mixbarato font-mono" id="modal-product-code"></p></div><div class="text-right"><span class="text-3xl font-black text-white" id="modal-product-price"></span></div></div><p class="text-zinc-300 mt-2" id="modal-product-desc"></p><div class="flex gap-3 pt-4 border-t border-zinc-800"><button id="modal-add-cart-btn" class="flex-1 btn-primary text-white py-4 rounded-xl font-black uppercase text-sm">Adicionar ao Pedido</button></div></div></div></div></div><div id="toast" class="toast hidden"></div><script>const WHATSAPP_NUMBER="5521987537876";const LOJA_NOME="Mixbarato";const SB_URL="https://rlenbazcaptaqfysjyxy.supabase.co";const SB_KEY="sb_publishable__8Ru8S8ZJXfjZIz2zEjGzQ_mPQVQY_t";const _supabase=supabase.createClient(SB_URL,SB_KEY);let products=[],categories=[],cart=[],currentFilter='Todos',currentUser="",currentImageData=[],currentSlide=0,currentProductImages=[],isEditing=false;async function loadInitialData(){await Promise.all([fetchCategories(),fetchProducts()]);renderProducts()}async function fetchCategories(){const{data}=await _supabase.from('categories').select('*').order('name');console.log('Categorias carregadas',data);categories=data.map(c=>c.name);updateAdminCategories(data);populateCategoryDropdown()}function populateCategoryDropdown(){const select=document.getElementById('new-p-cat');select.innerHTML='<option value="">Selecione a Categoria *</option>'+categories.map(c=>`<option value="${c}">${c}</option>`).join('')}async function addCategory(){const name=document.getElementById('new-cat-name').value.trim();if(!name)return;await _supabase.from('categories').insert([{name}]);document.getElementById('new-cat-name').value='';await fetchCategories();showToast('Sucesso','Categoria adicionada')}function updateAdminCategories(data){document.getElementById('admin-cats-list').innerHTML=data.map(c=>`<span class="bg-zinc-900 border border-zinc-700 text-sm px-3 py-2 rounded-lg flex items-center gap-2">${c.name} <button onclick="deleteCategory(${c.id})" class="text-red-500"><i class="fas fa-times"></i></button></span>`).join('')}async function deleteCategory(id){if(confirm('Excluir categoria?')){await _supabase.from('categories').delete().eq('id',id);fetchCategories()}}async function fetchProducts(){const{data}=await _supabase.from('products').select('*').order('created_at',{ascending:false});products=data;renderProducts();renderAdminList()}function renderProducts(){const grid=document.getElementById('product-grid');const nav=document.getElementById('dynamic-nav');let list=products;if(currentFilter!=='Todos')list=list.filter(p=>p.category===currentFilter);const term=document.getElementById('search-input').value.toLowerCase();if(term)list=list.filter(p=>p.name.toLowerCase().includes(term));const allCats=['Todos',...categories];nav.innerHTML=allCats.map(cat=>`<button onclick="currentFilter='${cat}';renderProducts()" class="category-pill ${currentFilter===cat?'active':'bg-zinc-800 text-zinc-400'} px-6 py-3 rounded-xl font-bold text-sm whitespace-nowrap">${cat}</button>`).join('');if(list.length===0){document.getElementById('empty-state').classList.remove('hidden');grid.innerHTML=''}else{document.getElementById('empty-state').classList.add('hidden');grid.innerHTML=list.map(p=>`<div class="product-card bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden relative"><div class="h-56 bg-zinc-800 cursor-pointer" onclick="openProductModal(${p.id})"><img src="${p.images[0]}" class="w-full h-full object-cover"></div><div class="p-5"><span class="text-[10px] font-bold text-mixbarato uppercase">${p.category}</span><h3 class="font-black text-lg text-white mb-2 uppercase truncate">${p.name}</h3><div class="flex justify-between items-center pt-4 border-t border-zinc-800"><div><span class="text-2xl font-black text-white">R$ ${p.price.toFixed(2)}</span></div><button onclick="addToCart(${p.id},this)" class="bg-white text-black px-6 py-3 rounded-xl font-bold text-xs uppercase">+ Adicionar</button></div></div></div>`).join('')}}function loginAdmin(){const p=prompt("Senha Admin:");if(p==="929130ab&"){document.body.classList.add('admin-mode');renderAdminList();showToast("Bem-vindo","Acesso autorizado")}else{alert("Senha incorreta")}}function logoutAdmin(){document.body.classList.remove('admin-mode')}function showToast(t,m){const toast=document.getElementById('toast');toast.innerHTML=`<div class="bg-zinc-800 border border-mixbarato/50 text-white px-6 py-4 rounded-xl shadow-2xl"><b>${t}</b><p class="text-xs text-zinc-400">${m}</p></div>`;toast.classList.remove('hidden');setTimeout(()=>toast.classList.add('hidden'),3000)}function handleImageSelect(e){const files=Array.from(e.target.files);files.forEach(file=>{const reader=new FileReader();reader.onload=e=>{currentImageData.push(e.target.result);updateImagePreview()};reader.readAsDataURL(file)})}function updateImagePreview(){const p=document.getElementById('multi-upload-preview');if(currentImageData.length>0){p.classList.remove('hidden');p.innerHTML=currentImageData.map((img,i)=>`<div class="preview-item"><img src="${img}"><button type="button" class="remove-btn" onclick="currentImageData.splice(${i},1);updateImagePreview()">&times;</button></div>`).join('')}else{p.classList.add('hidden')}}document.getElementById('admin-form').onsubmit=async function(e){e.preventDefault();const product={name:document.getElementById('new-p-name').value,price:parseFloat(document.getElementById('new-p-price').value),category:document.getElementById('new-p-cat').value,desc:document.getElementById('new-p-desc').value,images:currentImageData,code:'PRD'+Math.floor(Math.random()*999)};if(isEditing){const id=document.getElementById('edit-product-id').value;await _supabase.from('products').update(product).eq('id',id)}else{await _supabase.from('products').insert([product])}clearForm();await fetchProducts();showToast("Sucesso","Produto salvo no banco")};function clearForm(){document.getElementById('admin-form').reset();currentImageData=[];isEditing=false;updateImagePreview();document.getElementById('form-title').innerText='Novo Produto'}function renderAdminList(){const list=document.getElementById('admin-cats-list').parentNode.parentNode;let container=document.getElementById('admin-products-list');if(!container){container=document.createElement('div');container.id='admin-products-list';container.className="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-96 overflow-y-auto p-4";list.appendChild(container)}container.innerHTML=products.map(p=>`<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl flex items-center gap-4"><div><p class="font-bold">${p.name}</p><button onclick="editProduct(${p.id})" class="text-blue-500 mr-4">Editar</button><button onclick="deleteProduct(${p.id})" class="text-red-500">Excluir</button></div></div>`).join('')}async function deleteProduct(id){if(confirm('Excluir?')){await _supabase.from('products').delete().eq('id',id);fetchProducts()}}function editProduct(id){const p=products.find(x=>x.id===id);if(!p)return;isEditing=true;document.getElementById('edit-product-id').value=p.id;document.getElementById('new-p-name').value=p.name;document.getElementById('new-p-price').value=p.price;document.getElementById('new-p-cat').value=p.category;document.getElementById('new-p-desc').value=p.desc;currentImageData=p.images;updateImagePreview();document.getElementById('form-title').innerText='Editando: '+p.name}function addToCart(id,btn){const p=products.find(x=>x.id===id);const ex=cart.find(x=>x.id===id);if(ex)ex.quantity++;else cart.push({...p,quantity:1});updateCart();document.getElementById('cart-button').classList.remove('hidden');showToast("Adicionado",p.name)}function updateCart(){const total=cart.reduce((a,b)=>a+(b.price*b.quantity),0);document.getElementById('cart-count').innerText=cart.length;document.getElementById('cart-total-badge').innerText='R$ '+total.toFixed(2);document.getElementById('cart-total-modal').innerText='R$ '+total.toFixed(2);document.getElementById('cart-items').innerHTML=cart.map((item,i)=>`<div class="flex justify-between items-center text-sm"><span>${item.name} (${item.quantity}x)</span><span>R$ ${(item.price*item.quantity).toFixed(2)}</span><button onclick="cart.splice(${i},1);updateCart()" class="text-red-500">X</button></div>`).join('')}function openModal(){document.getElementById('cart-modal').classList.remove('hidden')}function closeModal(){document.getElementById('cart-modal').classList.add('hidden')}function clearCart(){cart=[];updateCart();closeModal()}function sendOrder(){const total=cart.reduce((a,b)=>a+(b.price*b.quantity),0);let msg=`*PEDIDO - MIXBARATO*\n\n`;cart.forEach(i=>{msg+=`- ${i.quantity}x ${i.name} (R$ ${i.price})\n`});msg+=`\n*Total: R$ ${total.toFixed(2)}*`;window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`)}function openProductModal(id){const p=products.find(x=>x.id===id);if(!p)return;currentProductImages=p.images;currentSlide=0;document.getElementById('modal-product-name').innerText=p.name;document.getElementById('modal-product-code').innerText='#'+p.code;document.getElementById('modal-product-price').innerText='R$ '+p.price.toFixed(2);document.getElementById('modal-product-desc').innerText=p.desc;renderCarousel();document.getElementById('product-modal').classList.remove('hidden')}function closeProductModal(){document.getElementById('product-modal').classList.add('hidden')}function renderCarousel(){const c=document.getElementById('carousel-container');c.innerHTML=currentProductImages.map((img,i)=>`<div class="carousel-slide ${i===0?'active':''}"><img src="${img}"></div>`).join('');updateCarousel()}function changeSlide(n){currentSlide+=n;if(currentSlide>=currentProductImages.length)currentSlide=0;if(currentSlide<0)currentSlide=currentProductImages.length-1;updateCarousel()}function updateCarousel(){document.querySelectorAll('.carousel-slide').forEach((s,i)=>s.classList.toggle('active',i===currentSlide))}document.addEventListener('DOMContentLoaded',loadInitialData);</script></body></html>
