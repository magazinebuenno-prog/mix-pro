<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mixbarato - Sistema Admin</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>tailwind.config = { theme: { extend: { colors: { mixbarato: '#EAB308', darkness: '#09090b', metal: '#27272a', success: '#22c55e', danger: '#ef4444', mixgreen: '#16a34a', mixyellow: '#facc15' }, animation: { 'fade-in': 'fadeIn 0.3s ease-out', 'slide-up': 'slideUp 0.4s ease-out', 'bounce-soft': 'bounceSoft 2s infinite' }, keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }, slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }, bounceSoft: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } } } } } }</script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>html { scroll-behavior: smooth; } .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; } .product-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(234, 179, 8, 0.3); } #admin-panel { display: none; } body.admin-mode #admin-panel { display: block; } body.admin-mode .admin-only { display: flex !important; } .admin-only { display: none !important; } .hero-gradient { background: linear-gradient(135deg, rgba(9,9,11,0.95) 0%, rgba(22,163,74,0.3) 50%, rgba(234,179,8,0.2) 100%), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80&w=1920'); background-size: cover; background-position: center; background-attachment: fixed; } .glass-panel { background: rgba(39, 39, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); } .input-field { background: rgba(9, 9, 11, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; } .input-field:focus { border-color: #EAB308; box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1); outline: none; } .btn-primary { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); transition: all 0.3s; } .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(234, 179, 8, 0.4); } .category-pill.active { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); color: white; } .image-upload-zone { border: 2px dashed rgba(234, 179, 8, 0.3); cursor: pointer; } .multi-upload-preview { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; } .preview-item { position: relative; aspect-ratio: 1; border-radius: 0.5rem; overflow: hidden; border: 2px solid #27272a; } .preview-item img { width: 100%; height: 100%; object-fit: cover; } .remove-btn { position: absolute; top: 5px; right: 5px; background: rgba(239, 68, 68, 0.9); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; } .carousel-container { position: relative; width: 100%; height: 400px; overflow: hidden; border-radius: 1rem; background: #18181b; } .carousel-slide { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; } .carousel-slide.active { display: flex; } .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; } .carousel-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; } .share-btn { position: absolute; top: 12px; right: 12px; background: #25D366; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.3s; z-index: 10; } .product-card:hover .share-btn { opacity: 1; } @media (max-width: 768px) { .share-btn { opacity: 1; top: 50px; } } .hero-title { font-size: clamp(3rem, 10vw, 8rem); line-height: 0.85; }</style></head><body class="bg-darkness text-zinc-100 font-sans antialiased"><section id="home" class="hero-gradient min-h-screen flex flex-col justify-center items-center text-center px-4 relative overflow-hidden"><div class="absolute inset-0 bg-gradient-to-b from-transparent via-darkness/50 to-darkness"></div><div class="relative z-10 max-w-4xl mx-auto animate-slide-up w-full"><div class="inline-flex items-center gap-2 bg-mixbarato/20 border border-mixbarato/50 text-mixbarato text-xs font-black px-4 py-2 rounded-full mb-6 animate-bounce-soft uppercase tracking-widest"><i class="fas fa-map-marker-alt"></i> Rio de Janeiro</div><h1 class="hero-title font-black italic text-white mb-6 select-none"><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixgreen to-mixyellow uppercase">Mix</span><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixyellow to-mixgreen uppercase">Barato</span></h1><div class="mt-10 flex flex-wrap justify-center gap-4"><a href="#catalogo" class="btn-primary text-white font-black px-12 py-5 rounded-2xl shadow-2xl uppercase italic flex items-center gap-3 text-lg"><i class="fas fa-shopping-bag text-2xl"></i> Ver Catálogo</a></div></div></section><section id="admin-panel" class="bg-zinc-900/95 border-y border-mixbarato/30 p-6 backdrop-blur-xl"><div class="container mx-auto max-w-7xl"><div class="flex justify-between items-center mb-8"><div class="flex items-center gap-4"><div><h2 class="text-mixbarato font-black uppercase italic text-2xl" id="admin-greeting">Painel Admin</h2></div></div><button onclick="logoutAdmin()" class="bg-zinc-800 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold uppercase transition-all"><i class="fas fa-sign-out-alt"></i> Sair</button></div><div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><div class="lg:col-span-3 glass-panel p-6 rounded-2xl"><p class="text-xs font-bold uppercase mb-4">Categorias</p><div class="flex gap-2 mb-4"><input type="text" id="new-cat-name" placeholder="Nova..." class="input-field flex-1 p-3 rounded-lg text-sm text-white"><button onclick="addCategory()" class="bg-mixbarato text-black px-4 rounded-lg"><i class="fas fa-plus"></i></button></div><div id="admin-cats-list" class="flex flex-wrap gap-2"></div></div><div class="lg:col-span-9 glass-panel p-6 rounded-2xl"><form id="admin-form" class="space-y-4"><div class="grid grid-cols-2 gap-4"><div class="col-span-2"><input type="text" id="new-p-name" placeholder="Nome do Produto *" class="input-field w-full p-4 rounded-lg text-white" required></div><div><input type="number" id="new-p-price" placeholder="Preço (R$) *" step="0.01" class="input-field w-full p-4 rounded-lg text-white" required></div><div><select id="new-p-cat" class="input-field w-full p-4 rounded-lg text-white bg-zinc-900" required><option value="">Categoria *</option></select></div><div class="col-span-2"><textarea id="new-p-desc" placeholder="Descrição..." class="input-field w-full p-4 rounded-lg text-white"></textarea></div><div class="col-span-2"><label class="font-bold text-xs text-zinc-500 uppercase">Links de Imagens (um por linha)</label><textarea id="new-p-images" rows="3" class="input-field w-full p-4 rounded-lg text-white" placeholder="URL 1\nURL 2"></textarea></div><button type="submit" class="col-span-2 btn-primary text-white py-4 rounded-lg font-black uppercase">Salvar Produto</button></div></form></div></div><div id="admin-products-list" class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8"></div></div></section><div id="catalogo" class="min-h-screen bg-zinc-900"><header class="sticky top-0 z-40 bg-darkness/95 backdrop-blur-xl border-b border-zinc-800 p-4"><div class="container mx-auto"><div class="flex items-center justify-between mb-4"><h1 class="text-2xl font-black italic text-white"><span class="text-mixbarato">MIX</span>BARATO</h1><button onclick="loginAdmin()" class="text-zinc-600 hover:text-mixbarato p-2"><i class="fas fa-user-shield text-xl"></i></button></div><div class="relative mb-4"><input type="text" id="search-input" oninput="renderProducts()" placeholder="Buscar produto..." class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-white"></div><nav id="dynamic-nav" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></nav></div></header><main class="container mx-auto px-4 py-8"><div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div></main></div><div id="product-modal" class="fixed inset-0 bg-black/95 z-50 hidden overflow-y-auto"><div class="max-w-4xl mx-auto my-10 bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-700"><div class="p-5 border-b border-zinc-800 flex justify-between"><h2 id="modal-product-name" class="text-xl font-black italic text-mixbarato"></h2><button onclick="closeProductModal()" class="text-2xl">&times;</button></div><div class="p-6"><div class="carousel-container" id="carousel-container"></div><div class="mt-6 space-y-4"><p id="modal-product-price" class="text-3xl font-black"></p><p id="modal-product-desc" class="text-zinc-400"></p><button onclick="sendOrder()" class="w-full btn-primary py-4 rounded-xl font-black">PEDIR NO WHATSAPP</button></div></div></div></div><script>const { createClient } = supabase; const _supabase = createClient('https://rlenbazcaptaqfysjyxy.supabase.co', 'sb_publishable__8Ru8S8ZJXfjZIz2zEjGzQ_mPQVQY_t'); let products = []; let categories = []; let currentFilter = 'Todos'; async function loadData() { const { data: cats } = await _supabase.from('categories').select('*'); categories = cats || []; const { data: prods } = await _supabase.from('products').select('*, categories(name)'); products = prods || []; updateDropdowns(); renderProducts(); renderAdminList(); } function updateDropdowns() { const select = document.getElementById('new-p-cat'); select.innerHTML = '<option value="">Categoria *</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join(''); const nav = document.getElementById('dynamic-nav'); const allCats = ['Todos', ...categories.map(c => c.name)]; nav.innerHTML = allCats.map(cat => `<button onclick="currentFilter='${cat}'; renderProducts()" class="px-6 py-2 rounded-xl font-bold text-sm ${currentFilter === cat ? 'bg-mixbarato text-black' : 'bg-zinc-800'}">${cat}</button>`).join(''); } function renderProducts() { const term = document.getElementById('search-input').value.toLowerCase(); let filtered = products; if(currentFilter !== 'Todos') filtered = filtered.filter(p => p.categories && p.categories.name === currentFilter); if(term) filtered = filtered.filter(p => p.name.toLowerCase().includes(term)); const grid = document.getElementById('product-grid'); grid.innerHTML = filtered.map(p => `<div class="product-card bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden p-4"><div class="relative h-48 bg-zinc-800 mb-4 cursor-pointer" onclick="openProductModal(${p.id})"><img src="${p.images ? p.images[0] : ''}" class="w-full h-full object-cover"><button onclick="event.stopPropagation(); shareProduct(${p.id})" class="share-btn"><i class="fab fa-whatsapp"></i></button></div><h3 class="font-bold uppercase">${p.name}</h3><p class="text-mixbarato font-black">R$ ${p.price}</p></div>`).join(''); } function renderAdminList() { const list = document.getElementById('admin-products-list'); list.innerHTML = products.map(p => `<div class="bg-zinc-800 p-2 rounded flex justify-between items-center"><span>${p.name}</span><button onclick="deleteProduct(${p.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`).join(''); const catList = document.getElementById('admin-cats-list'); catList.innerHTML = categories.map(c => `<span class="bg-zinc-700 px-2 py-1 rounded text-xs">${c.name}</span>`).join(''); } async function addCategory() { const name = document.getElementById('new-cat-name').value; if(!name) return; await _supabase.from('categories').insert([{name}]); document.getElementById('new-cat-name').value = ''; await loadData(); } async function loginAdmin() { const u = prompt("Usuário:"); const p = prompt("Senha:"); if(!u || !p) return; const { data } = await _supabase.from('staff').select('*').eq('login', u.toLowerCase()).single(); if(data && p === '929130ab&') { document.body.classList.add('admin-mode'); sessionStorage.setItem('mixbarato_session', u); loadData(); } } function logoutAdmin() { document.body.classList.remove('admin-mode'); sessionStorage.removeItem('mixbarato_session'); } document.getElementById('admin-form').onsubmit = async (e) => { e.preventDefault(); const p = { name: document.getElementById('new-p-name').value, price: document.getElementById('new-p-price').value, category_id: document.getElementById('new-p-cat').value, description: document.getElementById('new-p-desc').value, images: document.getElementById('new-p-images').value.split('\n').filter(i => i) }; await _supabase.from('products').insert([p]); e.target.reset(); await loadData(); }; function openProductModal(id) { const p = products.find(x => x.id === id); if(!p) return; document.getElementById('modal-product-name').innerText = p.name; document.getElementById('modal-product-price').innerText = 'R$ ' + p.price; document.getElementById('modal-product-desc').innerText = p.description; const carousel = document.getElementById('carousel-container'); carousel.innerHTML = (p.images || []).map((img, i) => `<div class="carousel-slide ${i === 0 ? 'active' : ''}"><img src="${img}"></div>`).join(''); document.getElementById('product-modal').classList.remove('hidden'); } function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); } async function deleteProduct(id) { if(confirm('Excluir?')) { await _supabase.from('products').delete().eq('id', id); loadData(); } } window.onload = loadData;</script></body></html>
