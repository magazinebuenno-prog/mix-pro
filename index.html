<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mixbarato - Painel Administrativo</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>tailwind.config = { theme: { extend: { colors: { mixbarato: '#EAB308', darkness: '#09090b', metal: '#27272a', success: '#22c55e', danger: '#ef4444', mixgreen: '#16a34a', mixyellow: '#facc15' }, animation: { 'fade-in': 'fadeIn 0.3s ease-out', 'slide-up': 'slideUp 0.4s ease-out', 'bounce-soft': 'bounceSoft 2s infinite' }, keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }, slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }, bounceSoft: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } } } } } }</script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>html { scroll-behavior: smooth; } .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; } .product-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(234, 179, 8, 0.3); } #admin-panel { display: none; } body.admin-mode #admin-panel { display: block; } body.admin-mode .admin-only { display: flex !important; } .admin-only { display: none !important; } .hero-gradient { background: linear-gradient(135deg, rgba(9,9,11,0.95) 0%, rgba(22,163,74,0.3) 50%, rgba(234,179,8,0.2) 100%), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80&w=1920'); background-size: cover; background-position: center; background-attachment: fixed; } .glass-panel { background: rgba(39, 39, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); } .input-field { background: rgba(9, 9, 11, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; } .input-field:focus { border-color: #EAB308; box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1); outline: none; } .btn-primary { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); transition: all 0.3s; } .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(234, 179, 8, 0.4); } .category-pill { transition: all 0.3s; } .category-pill.active { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); color: white; transform: scale(1.05); } .image-upload-zone { border: 2px dashed rgba(234, 179, 8, 0.3); transition: all 0.3s; cursor: pointer; } .image-upload-zone:hover, .image-upload-zone.dragover { border-color: #EAB308; background: rgba(234, 179, 8, 0.05); } .toast { position: fixed; bottom: 100px; right: 20px; z-index: 100; animation: slideUp 0.3s ease-out; } .cart-active-padding { padding-bottom: 180px !important; } .stock-badge { position: absolute; top: 12px; right: 12px; z-index: 10; } .quick-actions { position: absolute; top: 12px; left: 12px; display: flex; gap: 8px; opacity: 0; transform: translateY(-10px); transition: all 0.3s; z-index: 10; } .product-card:hover .quick-actions { opacity: 1; transform: translateY(0); } #cart-modal { align-items: flex-start; padding-top: 20px; padding-bottom: 20px; } #cart-modal .modal-container { max-height: calc(100vh - 40px); height: auto; display: flex; flex-direction: column; margin: auto; width: 100%; max-width: 600px; } #cart-items { overflow-y: auto; flex: 1 1 auto; min-height: 100px; max-height: calc(100vh - 400px); } .hero-title { font-size: clamp(3rem, 15vw, 8rem); line-height: 0.85; letter-spacing: -0.02em; } .carousel-container { position: relative; width: 100%; height: 400px; overflow: hidden; border-radius: 1rem; background: #18181b; } .carousel-slide { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; cursor: zoom-in; } .carousel-slide.active { display: flex; } .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; } .carousel-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; } .carousel-dot.active { background: #EAB308; } .share-btn { position: absolute; top: 12px; right: 12px; background: #25D366; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.3s; z-index: 10; }</style></head><body class="bg-darkness text-zinc-100 font-sans antialiased"><section id="home" class="hero-gradient min-h-screen flex flex-col justify-center items-center text-center px-4 relative overflow-hidden"><div class="absolute inset-0 bg-gradient-to-b from-transparent via-darkness/50 to-darkness"></div><div class="relative z-10 max-w-4xl mx-auto animate-slide-up w-full"><div class="inline-flex items-center gap-2 bg-mixbarato/20 border border-mixbarato/50 text-mixbarato text-xs font-black px-4 py-2 rounded-full mb-6 animate-bounce-soft uppercase tracking-widest"><i class="fas fa-map-marker-alt"></i> Rio de Janeiro - (21) 98753-7876</div><h1 class="hero-title font-black italic text-white mb-6 select-none"><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixgreen to-mixyellow uppercase">Mix</span><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixyellow to-mixgreen uppercase">Barato</span></h1><p class="mt-4 text-zinc-300 max-w-lg mx-auto font-medium text-base md:text-lg leading-relaxed px-4">Tudo que você precisa com preços imbatíveis! Utilidades, presentes, eletrônicos e muito mais.</p><div class="mt-10 flex flex-wrap justify-center gap-4"><a href="#catalogo" class="btn-primary text-white font-black px-8 md:px-12 py-4 md:py-5 rounded-2xl shadow-2xl uppercase italic flex items-center gap-2 md:gap-3 text-base md:text-lg"><i class="fas fa-shopping-bag text-xl md:text-2xl"></i> Ver Catálogo</a><button onclick="requestQuote()" class="glass-panel hover:bg-white/20 text-white font-black px-8 md:px-12 py-4 md:py-5 rounded-2xl border border-white/20 transition-all uppercase italic text-base md:text-lg backdrop-blur-md"><i class="fab fa-whatsapp mr-2"></i> Fazer Pedido</button></div></div></section><section id="admin-panel" class="bg-zinc-900/95 border-y border-mixbarato/30 p-6 backdrop-blur-xl"><div class="container mx-auto max-w-7xl"><div class="flex justify-between items-center mb-8"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-gradient-to-br from-mixgreen to-mixbarato rounded-xl flex items-center justify-center"><i class="fas fa-cog text-white text-xl"></i></div><div><h2 class="text-mixbarato font-black uppercase italic text-2xl" id="admin-greeting">Painel Admin</h2><p class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Gerenciamento de Produtos</p></div></div><button onclick="logoutAdmin()" class="bg-zinc-800 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold uppercase transition-all flex items-center gap-2"><i class="fas fa-sign-out-alt"></i> Sair</button></div><div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><div class="lg:col-span-3 glass-panel p-6 rounded-2xl"><p class="text-xs font-bold uppercase text-zinc-400 mb-4">Colaboradores</p><div class="space-y-3"><input type="text" id="staff-name" placeholder="Nome completo" class="input-field w-full p-3 rounded-lg text-white"><button onclick="addStaff()" class="w-full btn-primary text-white py-3 rounded-lg font-bold text-sm uppercase">Adicionar</button></div><div id="staff-list" class="mt-4 space-y-2"></div></div><div class="lg:col-span-3 glass-panel p-6 rounded-2xl"><p class="text-xs font-bold uppercase text-zinc-400 mb-4">Categorias</p><div class="flex gap-2 mb-4"><input type="text" id="new-cat-name" placeholder="Nova..." class="input-field flex-1 p-3 rounded-lg text-white"><button onclick="addCategory()" class="bg-mixbarato text-black px-4 rounded-lg font-bold"><i class="fas fa-plus"></i></button></div><div id="admin-cats-list" class="flex flex-wrap gap-2"></div></div><div class="lg:col-span-6 glass-panel p-6 rounded-2xl"><p class="text-xs font-bold uppercase text-zinc-400 mb-4" id="form-title">Novo Produto</p><form id="admin-form" class="space-y-4"><input type="hidden" id="edit-product-id" value=""><div class="grid grid-cols-2 gap-4"><div class="col-span-2"><input type="text" id="new-p-name" placeholder="Nome do Produto *" class="input-field w-full p-4 rounded-lg text-white" required></div><div><input type="number" id="new-p-price" placeholder="Preço (R$) *" step="0.01" class="input-field w-full p-4 rounded-lg text-white" required></div><div><select id="new-p-cat" class="input-field w-full p-4 rounded-lg text-white bg-zinc-900" required><option value="">Categoria *</option></select></div><div class="col-span-2"><textarea id="new-p-desc" placeholder="Descrição..." rows="2" class="input-field w-full p-4 rounded-lg text-white"></textarea></div><div class="col-span-2"><input type="text" id="new-p-images-link" placeholder="Links das Imagens (separados por vírgula)" class="input-field w-full p-4 rounded-lg text-white"></div><div class="col-span-2 flex gap-3"><button type="button" onclick="clearForm()" class="flex-1 bg-zinc-800 text-white py-4 rounded-lg font-bold uppercase">Limpar</button><button type="submit" class="flex-[2] btn-primary text-white py-4 rounded-lg font-black uppercase" id="submit-btn">Salvar</button></div></div></form></div></div><div class="mt-8 glass-panel p-6 rounded-2xl"><div id="admin-products-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div></div></div></section><div id="catalogo" class="min-h-screen bg-gradient-to-b from-darkness to-zinc-900"><header class="sticky top-0 z-40 bg-darkness/95 backdrop-blur-xl border-b border-zinc-800"><div class="container mx-auto px-4 py-4"><div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-br from-mixgreen to-mixbarato rounded-lg flex items-center justify-center"><i class="fas fa-shopping-bag text-white"></i></div><h1 class="text-2xl font-black italic text-white"><span class="text-mixbarato">MIX</span>BARATO</h1></div><button onclick="loginAdmin()" class="text-zinc-600 hover:text-mixbarato p-2"><i class="fas fa-user-shield text-xl"></i></button></div><div class="relative mb-4"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i><input type="text" id="search-input" oninput="searchProduct()" placeholder="Buscar..." class="w-full bg-zinc-900/80 border border-zinc-800 p-4 pl-12 rounded-xl text-white outline-none focus:border-mixbarato"></div><nav id="dynamic-nav" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></nav></div></header><main id="main-content" class="container mx-auto px-4 py-8"><div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div><div id="empty-state" class="hidden text-center py-20"><h3 class="text-xl font-bold text-white">Nenhum produto encontrado</h3></div></main></div><div id="cart-button" class="fixed bottom-6 left-0 right-0 px-4 z-40 hidden"><button onclick="openModal()" class="w-full max-w-md mx-auto btn-primary text-white py-4 rounded-2xl shadow-2xl flex justify-between items-center px-8"><span class="font-black flex items-center gap-3"><i class="fas fa-shopping-basket"></i> Meu Pedido <span id="cart-count" class="bg-white text-black text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span></span><span id="cart-total-badge" class="bg-white text-black px-4 py-2 rounded-lg font-black">R$ 0,00</span></button></div><div id="cart-modal" class="fixed inset-0 bg-black/90 z-50 hidden overflow-y-auto"><div class="modal-container bg-zinc-900 rounded-3xl border border-zinc-700 max-w-lg mx-auto p-6"><div class="flex justify-between mb-6"><h2 class="text-xl font-black text-mixbarato">SEU PEDIDO</h2><button onclick="closeModal()" class="text-white text-2xl">&times;</button></div><div id="cart-items" class="space-y-4 mb-6"></div><div class="border-t border-zinc-800 pt-4 space-y-4"><select id="checkout-extra" class="w-full p-3 rounded-xl bg-zinc-800 text-white"><option>Vou retirar na loja</option><option>Entrega via Motoboy</option></select><div class="flex justify-between items-center text-white"><span class="font-bold">Total</span><span id="cart-total-modal" class="text-2xl font-black">R$ 0,00</span></div><button onclick="sendOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase">Enviar via WhatsApp</button></div></div></div><div id="product-modal" class="fixed inset-0 bg-black/95 z-50 hidden overflow-y-auto"><div class="modal-container bg-zinc-900 rounded-3xl max-w-4xl mx-auto p-6 mt-10"><div class="flex justify-between mb-4"><h2 id="modal-product-name" class="text-2xl font-black text-white"></h2><button onclick="closeProductModal()" class="text-white text-3xl">&times;</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-8"><div class="carousel-container"><div id="carousel-inner" class="w-full h-full"></div></div><div class="text-white space-y-4"><p id="modal-product-category" class="text-mixbarato uppercase font-bold text-sm"></p><p id="modal-product-desc" class="text-zinc-400"></p><p id="modal-product-price" class="text-4xl font-black"></p><button id="modal-add-cart-btn" class="w-full btn-primary text-white py-4 rounded-xl font-black uppercase">Adicionar</button></div></div></div></div><div id="toast" class="toast hidden"></div><script>const WHATSAPP_NUMBER = '5521987537876'; const LOJA_NOME = 'Mixbarato'; const SUPABASE_URL = 'https://rlenbazcaptaqfysjyxy.supabase.co'; const SUPABASE_KEY = 'sb_publishable__8Ru8S8ZJXfjZIz2zEjGzQ_mPQVQY_t'; const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); let products = []; let categories = []; let staff = []; let cart = []; let currentFilter = 'Todos'; let currentUser = ''; async function loadData() { const { data: p } = await _supabase.from('products').select('*').order('created_at', { ascending: false }); products = p || []; const { data: c } = await _supabase.from('categories').select('*'); categories = (c || []).map(x => x.name); const { data: s } = await _supabase.from('staff').select('*'); staff = s || []; renderProducts(); renderAdmin(); } function showToast(t, m) { const toast = document.getElementById('toast'); toast.innerHTML = `<div class="bg-zinc-800 p-4 rounded-xl border border-mixbarato text-white shadow-2xl"><b>${t}</b><p class="text-sm">${m}</p></div>`; toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000); } function formatCurrency(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v); } async function loginAdmin() { const u = prompt('Usuário:'); const p = prompt('Senha:'); if (u === 'andre' && p === '929130ab#') { document.body.classList.add('admin-mode'); currentUser = 'André'; renderAdmin(); showToast('Bem-vindo', 'Acesso autorizado'); } } function logoutAdmin() { document.body.classList.remove('admin-mode'); } async function addStaff() { const name = document.getElementById('staff-name').value; if (!name) return; await _supabase.from('staff').insert([{ full_name: name, login: name.toLowerCase().split(' ')[0] }]); document.getElementById('staff-name').value = ''; loadData(); } async function addCategory() { const name = document.getElementById('new-cat-name').value; if (!name) return; await _supabase.from('categories').insert([{ name }]); document.getElementById('new-cat-name').value = ''; loadData(); } function clearForm() { document.getElementById('admin-form').reset(); document.getElementById('edit-product-id').value = ''; document.getElementById('form-title').innerText = 'Novo Produto'; } document.getElementById('admin-form').onsubmit = async (e) => { e.preventDefault(); const id = document.getElementById('edit-product-id').value; const payload = { name: document.getElementById('new-p-name').value, price: parseFloat(document.getElementById('new-p-price').value), category: document.getElementById('new-p-cat').value, description: document.getElementById('new-p-desc').value, images: document.getElementById('new-p-images-link').value.split(','), stock: true }; if (id) { await _supabase.from('products').update(payload).eq('id', id); } else { await _supabase.from('products').insert([payload]); } clearForm(); loadData(); showToast('Sucesso', 'Produto salvo'); }; async function deleteProduct(id) { if (confirm('Excluir?')) { await _supabase.from('products').delete().eq('id', id); loadData(); } } function renderAdmin() { document.getElementById('staff-list').innerHTML = staff.map(s => `<div class="bg-zinc-800 p-2 rounded">${s.full_name}</div>`).join(''); document.getElementById('admin-cats-list').innerHTML = categories.map(c => `<span class="bg-zinc-800 px-2 py-1 rounded">${c}</span>`).join(''); document.getElementById('new-p-cat').innerHTML = '<option value="">Categoria *</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join(''); document.getElementById('admin-products-list').innerHTML = products.map(p => `<div class="bg-zinc-800 p-2 flex gap-2 items-center rounded"><img src="${p.images[0]}" class="w-10 h-10 object-cover"><span>${p.name}</span><button onclick="editProduct(${p.id})" class="ml-auto"><i class="fas fa-edit"></i></button><button onclick="deleteProduct(${p.id})"><i class="fas fa-trash text-red-500"></i></button></div>`).join(''); } function editProduct(id) { const p = products.find(x => x.id == id); document.getElementById('edit-product-id').value = p.id; document.getElementById('new-p-name').value = p.name; document.getElementById('new-p-price').value = p.price; document.getElementById('new-p-cat').value = p.category; document.getElementById('new-p-desc').value = p.description; document.getElementById('new-p-images-link').value = p.images.join(','); document.getElementById('form-title').innerText = 'Editando ' + p.name; } function renderProducts() { const grid = document.getElementById('product-grid'); const nav = document.getElementById('dynamic-nav'); let filtered = products; if (currentFilter !== 'Todos') filtered = products.filter(p => p.category === currentFilter); nav.innerHTML = ['Todos', ...categories].map(c => `<button onclick="currentFilter='${c}';renderProducts()" class="category-pill px-4 py-2 rounded-xl font-bold ${currentFilter === c ? 'active' : 'bg-zinc-800 text-zinc-400'}">${c}</button>`).join(''); grid.innerHTML = filtered.map(p => `<div class="product-card bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden group relative"><div class="h-56 bg-zinc-800 cursor-pointer" onclick="openProductModal(${p.id})"><img src="${p.images[0]}" class="w-full h-full object-cover"></div><div class="p-5"><span class="text-[10px] text-mixbarato uppercase font-bold">${p.category}</span><h3 class="text-white font-bold h-12">${p.name}</h3><div class="flex justify-between items-center mt-4"><span class="text-xl font-black text-white">${formatCurrency(p.price)}</span><button onclick="addToCart(${p.id})" class="bg-white text-black px-4 py-2 rounded-lg font-bold">+ Adicionar</button></div></div></div>`).join(''); } function openProductModal(id) { const p = products.find(x => x.id == id); document.getElementById('modal-product-name').innerText = p.name; document.getElementById('modal-product-category').innerText = p.category; document.getElementById('modal-product-desc').innerText = p.description; document.getElementById('modal-product-price').innerText = formatCurrency(p.price); document.getElementById('carousel-inner').innerHTML = `<img src="${p.images[0]}" class="w-full h-full object-contain">`; document.getElementById('modal-add-cart-btn').onclick = () => addToCart(p.id); document.getElementById('product-modal').classList.remove('hidden'); } function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); } function addToCart(id) { const p = products.find(x => x.id == id); const exists = cart.find(x => x.id == id); if (exists) exists.quantity++; else cart.push({ ...p, quantity: 1 }); updateCart(); document.getElementById('cart-button').classList.remove('hidden'); showToast('Adicionado', p.name); } function updateCart() { const container = document.getElementById('cart-items'); const total = cart.reduce((a, b) => a + (b.price * b.quantity), 0); container.innerHTML = cart.map(i => `<div class="flex justify-between text-white"><span>${i.quantity}x ${i.name}</span><span>${formatCurrency(i.price * i.quantity)}</span></div>`).join(''); document.getElementById('cart-total-badge').innerText = formatCurrency(total); document.getElementById('cart-total-modal').innerText = formatCurrency(total); document.getElementById('cart-count').innerText = cart.length; } function sendOrder() { let msg = `*Pedido Mixbarato*\n\n`; cart.forEach(i => msg += `• ${i.quantity}x ${i.name} - ${formatCurrency(i.price * i.quantity)}\n`); const total = cart.reduce((a, b) => a + (b.price * b.quantity), 0); msg += `\n*Total: ${formatCurrency(total)}*`; window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`); } function openModal() { document.getElementById('cart-modal').classList.remove('hidden'); } function closeModal() { document.getElementById('cart-modal').classList.add('hidden'); } function searchProduct() { const term = document.getElementById('search-input').value.toLowerCase(); const filtered = products.filter(p => p.name.toLowerCase().includes(term)); renderProducts(filtered); } document.addEventListener('DOMContentLoaded', loadData);</script></body></html>
