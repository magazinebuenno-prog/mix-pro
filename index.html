<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mixbarato - Catálogo Digital</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>tailwind.config={theme:{extend:{colors:{mixbarato:"#EAB308",darkness:"#09090b",metal:"#27272a",success:"#22c55e",danger:"#ef4444",mixgreen:"#16a34a",mixyellow:"#facc15"},animation:{'fade-in':'fadeIn 0.3s ease-out','slide-up':'slideUp 0.4s ease-out','bounce-soft':'bounceSoft 2s infinite'},keyframes:{fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideUp:{'0%':{transform:'translateY(20px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},bounceSoft:{'0%, 100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-5px)'}}}}}}</script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>html{scroll-behavior:smooth}.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}.product-card{transition:all 0.3s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d}.product-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 40px -10px rgba(234,179,8,0.3)}#admin-panel{display:none}body.admin-mode #admin-panel{display:block}body.admin-mode .admin-only{display:flex!important}.admin-only{display:none!important}.hero-gradient{background:linear-gradient(135deg,rgba(9,9,11,0.95) 0%,rgba(22,163,74,0.3) 50%,rgba(234,179,8,0.2) 100%),url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80&w=1920');background-size:cover;background-position:center;background-attachment:fixed}.glass-panel{background:rgba(39,39,42,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1)}.input-field{background:rgba(9,9,11,0.8);border:1px solid rgba(255,255,255,0.1);transition:all 0.3s}.input-field:focus{border-color:#EAB308;box-shadow:0 0 0 3px rgba(234,179,8,0.1);outline:none}.btn-primary{background:linear-gradient(135deg,#16a34a 0%,#EAB308 100%);transition:all 0.3s}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 25px -5px rgba(234,179,8,0.4)}.category-pill{transition:all 0.3s}.category-pill.active{background:linear-gradient(135deg,#16a34a 0%,#EAB308 100%);color:white;transform:scale(1.05)}.image-upload-zone{border:2px dashed rgba(234,179,8,0.3);transition:all 0.3s;cursor:pointer}.image-upload-zone:hover,.image-upload-zone.dragover{border-color:#EAB308;background:rgba(234,179,8,0.05)}.toast{position:fixed;bottom:100px;right:20px;z-index:100;animation:slideUp 0.3s ease-out}.share-btn{position:absolute;top:12px;right:50px;background:#25D366;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(-10px);transition:all 0.3s;z-index:10;border:2px solid rgba(255,255,255,0.2)}.product-card:hover .share-btn{opacity:1;transform:translateY(0)}#cart-modal .modal-container{max-height:calc(100vh - 40px);width:100%;max-width:600px}#cart-items{overflow-y:auto;max-height:calc(100vh - 400px)}</style></head><body class="bg-darkness text-zinc-100 font-sans antialiased"><section id="home" class="hero-gradient min-h-screen flex flex-col justify-center items-center text-center px-4 relative overflow-hidden"><div class="absolute inset-0 bg-gradient-to-b from-transparent via-darkness/50 to-darkness"></div><div class="relative z-10 max-w-4xl mx-auto animate-slide-up w-full"><div class="inline-flex items-center gap-2 bg-mixbarato/20 border border-mixbarato/50 text-mixbarato text-xs font-black px-4 py-2 rounded-full mb-6 uppercase tracking-widest">CATÁLOGO DIGITAL ATUALIZADO</div><h1 class="text-6xl md:text-8xl font-black italic text-white mb-6 uppercase"><span class="text-transparent bg-clip-text bg-gradient-to-r from-mixgreen to-mixyellow">Mix</span> Gestão</h1><p class="mt-4 text-zinc-300 max-w-lg mx-auto font-medium text-lg leading-relaxed">Sua loja de variedades em um só clique. Gestão simplificada e pedidos direto no WhatsApp.</p><div class="mt-10 flex flex-wrap justify-center gap-4"><a href="#catalogo" class="btn-primary text-white font-black px-12 py-5 rounded-2xl shadow-2xl uppercase italic flex items-center gap-3">Ver Catálogo</a></div></div></section><section id="admin-panel" class="bg-zinc-900/95 border-y border-mixbarato/30 p-6 backdrop-blur-xl"><div class="container mx-auto max-w-7xl"><div class="flex justify-between items-center mb-8"><div class="flex items-center gap-4"><div><h2 class="text-mixbarato font-black uppercase italic text-2xl">Painel de Gestão</h2><p class="text-zinc-500 text-xs font-bold uppercase">Nicho: Variedades</p></div></div><button onclick="logoutAdmin()" class="bg-zinc-800 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold uppercase transition-all">Sair</button></div><div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><div class="lg:col-span-12 glass-panel p-6 rounded-2xl"><form id="admin-form" class="space-y-4"><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div><input type="text" id="new-p-name" placeholder="Nome do Produto" class="input-field w-full p-4 rounded-lg text-white" required></div><div><input type="number" id="new-p-price" placeholder="Preço (R$)" step="0.01" class="input-field w-full p-4 rounded-lg text-white" required></div><div><select id="new-p-cat" class="input-field w-full p-4 rounded-lg text-white"><option value="Geral">Geral</option><option value="Utilidades">Utilidades</option><option value="Eletrônicos">Eletrônicos</option></select></div><div class="md:col-span-3"><textarea id="new-p-desc" placeholder="Descrição" class="input-field w-full p-4 rounded-lg text-white"></textarea></div><div class="md:col-span-3"><input type="text" id="new-p-img" placeholder="URL da Imagem" class="input-field w-full p-4 rounded-lg text-white"></div><button type="submit" class="md:col-span-3 btn-primary text-white py-4 rounded-lg font-black uppercase">Salvar Produto</button></div></form></div></div></div></section><div id="catalogo" class="min-h-screen"><header class="sticky top-0 z-40 bg-darkness/95 backdrop-blur-xl border-b border-zinc-800 p-4"><div class="container mx-auto flex justify-between items-center"><h1 class="text-2xl font-black italic">MIX<span class="text-mixbarato">BARATO</span></h1><button onclick="loginAdmin()" class="text-zinc-500"><i class="fas fa-user-shield"></i></button></div></header><main id="main-content" class="container mx-auto px-4 py-8"><div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div></main></div><script>const SUPABASE_URL = "https://rlenbazcaptaqfysjyxy.supabase.co";const SUPABASE_KEY = "sb_publishable__8Ru8S8ZJXfjZIz2zEjGzQ_mPQVQY_t";const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);let cart = [];async function loadProducts(){const {data,error}=await _supabase.from('products').select('*').order('created_at',{ascending:false});if(data) renderProducts(data);}function renderProducts(list){const grid = document.getElementById('product-grid');grid.innerHTML = list.map(p => `<div class="product-card bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden"><img src="${p.image_url || 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136'}" class="w-full h-48 object-cover"><div class="p-4"><span class="text-xs text-mixbarato font-bold">${p.category}</span><h3 class="font-black text-white">${p.name}</h3><p class="text-2xl font-black text-white mt-2">R$ ${p.price.toFixed(2)}</p><button onclick="addToCart('${p.id}')" class="w-full btn-primary mt-4 py-2 rounded-xl text-white font-bold">Adicionar</button></div></div>`).join('');}document.getElementById('admin-form').onsubmit = async (e) => {e.preventDefault();const p = {name: document.getElementById('new-p-name').value,price: parseFloat(document.getElementById('new-p-price').value),category: document.getElementById('new-p-cat').value,desc: document.getElementById('new-p-desc').value,image_url: document.getElementById('new-p-img').value};const {error} = await _supabase.from('products').insert([p]);if(!error){alert('Produto salvo!');loadProducts();}else{alert('Erro ao salvar');}};function loginAdmin(){const p = prompt("Senha:");if(p === "929130ab&"){document.body.classList.add('admin-mode');}}function logoutAdmin(){document.body.classList.remove('admin-mode');}loadProducts();</script></body></html>
