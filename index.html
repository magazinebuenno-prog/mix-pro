linear-gradient(135deg, #16a34a 0%, #EAB308 100%); }</style></head><body class="bg-darkness text-zinc-100 font-sans"><section id="home" class="hero-gradient min-h-screen flex flex-col justify-center items-center text-center px-4 relative"><div class="relative z-10 max-w-4xl mx-auto animate-slide-up"><h1 class="text-7xl font-black italic text-white mb-6"><span class="text-mixgreen">MIX</span><span class="text-mixyellow">BARATO</span></h1><p class="text-zinc-300 max-w-lg mx-auto">O maior catálogo de variedades do Rio. De eletrônicos a utilidades domésticas.</p><div class="mt-10 flex flex-wrap justify-center gap-4"><a href="#catalogo" class="btn-primary text-white font-black px-12 py-5 rounded-2xl uppercase italic flex items-center gap-3">Ver Catálogo</a></div></div></section><section id="admin-panel" class="bg-zinc-900/95 border-y border-mixbarato/30 p-6"><div class="container mx-auto"><h2 class="text-mixbarato font-black uppercase text-2xl">Admin MixBarato</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6"><div class="glass-panel p-6 rounded-2xl"><h3 class="text-white font-bold mb-4">Novo Produto</h3><form id="admin-form" class="space-y-4"><input type="text" id="p-name" placeholder="Nome" class="input-field w-full p-4 rounded-lg"><input type="number" id="p-price" placeholder="Preço" class="input-field w-full p-4 rounded-lg"><select id="p-cat" class="input-field w-full p-4 rounded-lg text-white"><option value="Geral">Geral</option><option value="Eletrônicos">Eletrônicos</option><option value="Cozinha">Cozinha</option></select><button type="submit" class="w-full btn-primary py-4 rounded-lg font-black">SALVAR</button></form></div></div></div></section><div id="catalogo" class="container mx-auto px-4 py-8"><div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div></div><script>const _SUPABASE_URL = "https://rlenbazcaptaqfysjyxy.supabase.co"; const _SUPABASE_KEY = "sb_publishable__8Ru8S8ZJXfjZIz2zEjGzQ_mPQVQY_t"; const supabase = supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY); async function loadProducts() { const { data, error } = await supabase.from('products').select('*'); if(!error) renderList(data); } function renderList(list) { const grid = document.getElementById('product-grid'); grid.innerHTML = list.map(p => `<div class="product-card bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden p-5"><h3 class="font-black text-xl text-white">${p.name}</h3><p class="text-mixbarato font-bold text-2xl">R$ ${p.price}</p><button class="mt-4 w-full bg-white text-black py-3 rounded-xl font-bold">Adicionar</button></div>`).join(''); } document.getElementById('admin-form').onsubmit = async (e) => { e.preventDefault(); const name = document.getElementById('p-name').value; const price = document.getElementById('p-price').value; const category = document.getElementById('p-cat').value; await supabase.from('products').insert([{ name, price, category }]); loadProducts(); }; loadProducts();</script></body></html>
