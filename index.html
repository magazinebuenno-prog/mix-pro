<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mixbarato - Catálogo Digital Profissional</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>tailwind.config = { theme: { extend: { colors: { mixbarato: '#EAB308', darkness: '#09090b', metal: '#27272a', success: '#22c55e', danger: '#ef4444', mixgreen: '#16a34a', mixyellow: '#facc15' }, animation: { 'fade-in': 'fadeIn 0.3s ease-out', 'slide-up': 'slideUp 0.4s ease-out', 'bounce-soft': 'bounceSoft 2s infinite' }, keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }, slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }, bounceSoft: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } } } } } }</script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>html { scroll-behavior: smooth; } .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; } .product-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(234, 179, 8, 0.3); } #admin-panel { display: none; } body.admin-mode #admin-panel { display: block; } body.admin-mode .admin-only { display: flex !important; } .admin-only { display: none !important; } .hero-gradient { background: linear-gradient(135deg, rgba(9,9,11,0.95) 0%, rgba(22,163,74,0.3) 50%, rgba(234,179,8,0.2) 100%), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80&w=1920'); background-size: cover; background-position: center; background-attachment: fixed; } .glass-panel { background: rgba(39, 39, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); } .input-field { background: rgba(9, 9, 11, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; } .input-field:focus { border-color: #EAB308; box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1); outline: none; } .btn-primary { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); transition: all 0.3s; } .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(234, 179, 8, 0.4); } .category-pill { transition: all 0.3s; } .category-pill.active { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); color: white; transform: scale(1.05); } .image-upload-zone { border: 2px dashed rgba(234, 179, 8, 0.3); transition: all 0.3s; cursor: pointer; } .image-upload-zone:hover, .image-upload-zone.dragover { border-color: #EAB308; background: rgba(234, 179, 8, 0.05); } .toast { position: fixed; bottom: 100px; right: 20px; z-index: 100; animation: slideUp 0.3s ease-out; } .hero-title { font-size: clamp(3rem, 15vw, 8rem); line-height: 0.85; letter-spacing: -0.02em; } .carousel-container { position: relative; width: 100%; height: 400px; overflow: hidden; border-radius: 1rem; background: #18181b; } .carousel-slide { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; } .carousel-slide.active { display: flex; } .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; } .multi-upload-preview { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; } .preview-item { position: relative; aspect-ratio: 1; border-radius: 0.5rem; overflow: hidden; border: 2px solid #27272a; } .preview-item img { width: 100%; height: 100%; object-fit: cover; }</style></head><body class="bg-darkness text-zinc-100 font-sans antialiased"><section id="home" class="hero-gradient min-h-screen flex flex-col justify-center items-center text-center px-4 relative overflow-hidden"><div class="absolute inset-0 bg-gradient-to-b from-transparent via-darkness/50 to-darkness"></div><div class="relative z-10 max-w-4xl mx-auto animate-slide-up w-full"><div class="inline-flex items-center gap-2 bg-mixbarato/20 border border-mixbarato/50 text-mixbarato text-xs font-black px-4 py-2 rounded-full mb-6 animate-bounce-soft uppercase tracking-widest"><i class="fas fa-map-marker-alt"></i> RJ - (21) 98753-7876</div><h1 class="hero-title font-black italic text-white mb-6 select-none"><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixgreen to-mixyellow uppercase">Mix</span><span class="block text-transparent bg-clip-text bg-gradient-to-r from-mixyellow to-mixgreen uppercase">Barato</span></h1><p class="mt-4 text-zinc-300 max-w-lg mx-auto font-medium text-base md:text-lg leading-relaxed px-4">Seu hub de utilidades e eletrônicos com entrega expressa e os melhores preços do mercado.</p><div class="mt-10 flex flex-wrap justify-center gap-4"><a href="#catalogo" class="btn-primary text-white font-black px-8 md:px-12 py-4 md:py-5 rounded-2xl shadow-2xl uppercase italic flex items-center gap-2 text-base"><i class="fas fa-shopping-bag text-xl"></i> Ver Catálogo</a><button onclick="loginAdmin()" class="glass-panel hover:bg-white/20 text-white font-black px-8 md:px-12 py-4 md:py-5 rounded-2xl border border-white/20 transition-all uppercase italic text-base backdrop-blur-md"><i class="fas fa-lock mr-2"></i> Admin</button></div></div></section><section id="admin-panel" class="bg-zinc-900/95 border-y border-mixbarato/30 p-6 backdrop-blur-xl"><div class="container mx-auto max-w-7xl"><div class="flex justify-between items-center mb-8"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-gradient-to-br from-mixgreen to-mixbarato rounded-xl flex items-center justify-center"><i class="fas fa-cog text-white text-xl"></i></div><div><h2 class="text-mixbarato font-black uppercase italic text-2xl" id="admin-greeting">Painel</h2></div></div><button onclick="logoutAdmin()" class="bg-zinc-800 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold uppercase transition-all"><i class="fas fa-sign-out-alt"></i> Sair</button></div><div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><div class="lg:col-span-12 glass-panel p-6 rounded-2xl"><form id="admin-form" class="grid grid-cols-1 md:grid-cols-2 gap-4"><input type="text" id="new-p-name" placeholder="Nome do Produto" class="input-field p-4 rounded-lg text-white" required><input type="number" id="new-p-price" placeholder="Preço (R$)" step="0.01" class="input-field p-4 rounded-lg text-white" required><select id="new-p-cat" class="input-field p-4 rounded-lg text-white bg-zinc-900" required><option value="">Categoria</option></select><textarea id="new-p-desc" placeholder="Descrição" class="input-field p-4 rounded-lg text-white md:col-span-2"></textarea><input type="text" id="new-p-img" placeholder="URL da Imagem" class="input-field p-4 rounded-lg text-white md:col-span-2"><button type="submit" class="btn-primary md:col-span-2 text-white py-4 rounded-lg font-black uppercase">Salvar Produto</button></form></div></div></div></section><div id="catalogo" class="min-h-screen bg-zinc-950 px-4 py-8"><div class="container mx-auto"><nav id="dynamic-nav" class="flex gap-2 overflow-x-auto no-scrollbar pb-6"></nav><div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div></div></div><div id="toast" class="toast hidden"></div><script>const SUPABASE_URL = 'https://rlenbazcaptaqfysjyxy.supabase.co'; const SUPABASE_KEY = 'sb_publishable__8Ru8S8ZJXfjZIz2zEjGzQ_mPQVQY_t'; const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); let products = []; let categories = []; let currentFilter = 'Todos'; async function loadData() { let { data: cats } = await supabase.from('categories').select('*'); categories = cats.map(c => c.name); let { data: prods } = await supabase.from('products').select('*'); products = prods; renderUI(); } function renderUI() { const nav = document.getElementById('dynamic-nav'); const allCats = ['Todos', ...categories]; nav.innerHTML = allCats.map(cat => `<button onclick="currentFilter='${cat}'; renderProducts()" class="category-pill ${currentFilter === cat ? 'active' : 'bg-zinc-800'} px-6 py-2 rounded-full font-bold text-sm">${cat}</button>`).join(''); const catSelect = document.getElementById('new-p-cat'); catSelect.innerHTML = '<option value="">Categoria</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join(''); renderProducts(); } function renderProducts() { const grid = document.getElementById('product-grid'); let filtered = products; if (currentFilter !== 'Todos') filtered = products.filter(p => p.category === currentFilter); grid.innerHTML = filtered.map(p => `<div class="product-card bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden p-4"><img src="${p.images ? p.images[0] : ''}" class="w-full h-48 object-cover rounded-xl mb-4"><h3 class="font-bold text-white uppercase">${p.name}</h3><p class="text-mixbarato font-black text-xl">R$ ${p.price.toFixed(2)}</p><button onclick="addToCart(${p.id})" class="btn-primary w-full mt-4 py-2 rounded-xl text-white font-bold">Adicionar</button></div>`).join(''); } document.getElementById('admin-form').onsubmit = async (e) => { e.preventDefault(); const newProd = { name: document.getElementById('new-p-name').value, price: parseFloat(document.getElementById('new-p-price').value), category: document.getElementById('new-p-cat').value, desc: document.getElementById('new-p-desc').value, images: [document.getElementById('new-p-img').value] }; await supabase.from('products').insert([newProd]); loadData(); e.target.reset(); }; function loginAdmin() { const p = prompt('Senha Admin:'); if (p === '929130ab#') { document.body.classList.add('admin-mode'); window.location.hash = 'admin-panel'; } } loadData();</script></body></html>
