<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mixbarato - Catálogo Inteligente</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>tailwind.config = { theme: { extend: { colors: { mixbarato: '#EAB308', darkness: '#09090b', metal: '#27272a', success: '#22c55e', danger: '#ef4444', mixgreen: '#16a34a', mixyellow: '#facc15' }, animation: { 'fade-in': 'fadeIn 0.3s ease-out', 'slide-up': 'slideUp 0.4s ease-out', 'bounce-soft': 'bounceSoft 2s infinite' }, keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }, slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }, bounceSoft: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } } } } } }</script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>html { scroll-behavior: smooth; } .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; } .product-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(234, 179, 8, 0.3); } #admin-panel { display: none; } body.admin-mode #admin-panel { display: block; } body.admin-mode .admin-only { display: flex !important; } .admin-only { display: none !important; } .glass-panel { background: rgba(39, 39, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); } .input-field { background: rgba(9, 9, 11, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; color: white; } .input-field:focus { border-color: #EAB308; box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1); outline: none; } .btn-primary { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); transition: all 0.3s; } .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(234, 179, 8, 0.4); } .category-pill.active { background: linear-gradient(135deg, #16a34a 0%, #EAB308 100%); color: white; } .carousel-container { position: relative; width: 100%; height: 400px; overflow: hidden; border-radius: 1rem; background: #18181b; } .carousel-slide { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; } .carousel-slide.active { display: flex; } .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; } .carousel-slide.zoomed img { transform: scale(2); cursor: zoom-out; } .multi-upload-preview { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; } .preview-item { position: relative; aspect-ratio: 1; border-radius: 0.5rem; overflow: hidden; border: 2px solid #27272a; } .preview-item img { width: 100%; height: 100%; object-fit: cover; }</style></head><body class="bg-darkness text-zinc-100 font-sans antialiased"><section id="admin-panel" class="bg-zinc-900/95 border-b border-mixbarato/30 p-6"><div class="container mx-auto max-w-7xl"><div class="flex justify-between items-center mb-8"><div><h2 class="text-mixbarato font-black uppercase italic text-2xl">Painel Admin</h2><p id="admin-greeting" class="text-zinc-500 text-xs font-bold uppercase tracking-wider"></p></div><button onclick="logoutAdmin()" class="bg-zinc-800 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold uppercase">Sair</button></div><div class="grid grid-cols-1 lg:grid-cols-12 gap-6"><div class="lg:col-span-4 glass-panel p-6 rounded-2xl"><div><p class="text-xs font-bold uppercase mb-4 text-zinc-400">Nova Categoria</p><div class="flex gap-2"><input type="text" id="new-cat-name" class="input-field flex-1 p-3 rounded-lg" placeholder="Nome..."><button onclick="addCategory()" class="bg-mixbarato text-black px-4 rounded-lg font-bold"><i class="fas fa-plus"></i></button></div></div><div class="mt-6"><p class="text-xs font-bold uppercase mb-4 text-zinc-400">Colaboradores</p><div class="space-y-2"><input type="text" id="staff-name" class="input-field w-full p-3 rounded-lg" placeholder="Nome Completo"><button onclick="addStaff()" class="w-full btn-primary text-white py-3 rounded-lg font-bold uppercase">Cadastrar</button></div></div></div><div class="lg:col-span-8 glass-panel p-6 rounded-2xl"><p class="text-xs font-bold uppercase mb-4 text-zinc-400">Novo Produto</p><form id="admin-form" class="grid grid-cols-2 gap-4"><input type="hidden" id="edit-product-id"><input type="text" id="new-p-name" placeholder="Nome do Produto *" class="input-field col-span-2 p-4 rounded-lg" required><input type="number" id="new-p-price" placeholder="Preço (R$) *" step="0.01" class="input-field p-4 rounded-lg" required><select id="new-p-cat" class="input-field p-4 rounded-lg" required><option value="">Categoria *</option></select><textarea id="new-p-desc" placeholder="Descrição..." class="input-field col-span-2 p-4 rounded-lg h-24"></textarea><div class="col-span-2"><input type="text" id="image-links" placeholder="Links das Imagens (Separados por vírgula)" class="input-field w-full p-4 rounded-lg"></div><div class="col-span-2 flex gap-3"><button type="button" onclick="clearForm()" class="flex-1 bg-zinc-800 py-4 rounded-lg font-bold">LIMPAR</button><button type="submit" class="flex-[2] btn-primary py-4 rounded-lg font-black">SALVAR PRODUTO</button></div></form></div></div></div></section><header class="sticky top-0 z-40 bg-darkness/95 backdrop-blur-xl border-b border-zinc-800"><div class="container mx-auto px-4 py-4"><div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><div class="w-10 h-10 gradient-bg rounded-lg flex items-center justify-center"><i class="fas fa-shopping-bag text-white"></i></div><h1 class="text-2xl font-black italic tracking-tighter text-white">MIXBARATO</h1></div><button onclick="loginAdmin()" class="text-zinc-600 hover:text-mixbarato transition-colors p-2"><i class="fas fa-user-shield text-xl"></i></button></div><div class="relative mb-4"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i><input type="text" id="search-input" oninput="renderProducts()" placeholder="O que você procura hoje?" class="w-full bg-zinc-900 border border-zinc-800 p-4 pl-12 rounded-xl text-white outline-none focus:border-mixbarato shadow-inner"></div><nav id="dynamic-nav" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></nav></div></header><main class="container mx-auto px-4 py-8"><div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div><div id="empty-state" class="hidden text-center py-20"><p class="text-zinc-500">Nenhum produto encontrado...</p></div></main><div id="cart-button" class="fixed bottom-6 left-0 right-0 px-4 z-40 hidden"><button onclick="openCart()" class="w-full max-w-md mx-auto btn-primary text-white py-4 rounded-2xl shadow-2xl flex justify-between items-center px-8 border border-white/20 font-black italic uppercase"><span class="flex items-center gap-3"><i class="fas fa-shopping-basket"></i> Meu Pedido (<span id="cart-count">0</span>)</span><span id="cart-total-badge">R$ 0,00</span></button></div><div id="cart-modal" class="fixed inset-0 bg-black/90 z-50 hidden overflow-y-auto"><div class="max-w-xl mx-auto bg-zinc-900 min-h-screen p-6"><div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black italic text-mixbarato">SEU PEDIDO</h2><button onclick="closeCart()" class="text-3xl">&times;</button></div><div id="cart-items" class="space-y-4 mb-8"></div><div class="space-y-4"><select id="checkout-extra" class="w-full input-field p-4 rounded-xl"><option value="Retirada">Vou retirar na loja</option><option value="Entrega">Entrega via Motoboy</option></select><textarea id="order-notes" placeholder="Observações..." class="w-full input-field p-4 rounded-xl h-24"></textarea><div class="flex justify-between items-center border-t border-white/10 pt-4"><span class="text-xl font-black">TOTAL</span><span id="cart-total-modal" class="text-2xl font-black">R$ 0,00</span></div><button onclick="sendOrder()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase flex items-center justify-center gap-3"><i class="fab fa-whatsapp"></i> ENVIAR PEDIDO</button></div></div></div><div id="product-modal" class="fixed inset-0 bg-black/95 z-50 hidden overflow-y-auto"><div class="max-w-4xl mx-auto bg-zinc-900 min-h-screen p-6 flex flex-col"><div class="flex justify-between items-center mb-6"><h2 id="modal-product-name" class="text-2xl font-black italic"></h2><button onclick="closeProductModal()" class="text-3xl">&times;</button></div><div class="grid md:grid-cols-2 gap-8"><div class="space-y-4"><div id="carousel-container" class="carousel-container"></div><div id="thumbnail-container" class="flex gap-2 overflow-x-auto"></div></div><div class="space-y-6"><div><span class="text-xs font-bold text-zinc-500 uppercase">Preço</span><p id="modal-product-price" class="text-4xl font-black text-white"></p></div><div><span class="text-xs font-bold text-zinc-500 uppercase">Descrição</span><p id="modal-product-desc" class="text-zinc-400 mt-2"></p></div><button id="modal-add-cart-btn" class="w-full btn-primary py-5 rounded-xl font-black uppercase">ADICIONAR AO PEDIDO</button></div></div></div></div><script>const SB_URL = 'https://rlenbazcaptaqfysjyxy.supabase.co'; const SB_KEY = 'sb_publishable__8Ru8S8ZJXfjZIz2zEjGzQ_mPQVQY_t'; const supabase = supabase.createClient(SB_URL, SB_KEY); let products = []; let categories = []; let staff = []; let cart = []; let currentFilter = 'Todos'; let currentUser = ''; let currentSlide = 0; async function init() { await loadData(); renderProducts(); renderAdmin(); } async function loadData() { let {data:p} = await supabase.from('products').select('*').order('id', {ascending: false}); let {data:c} = await supabase.from('categories').select('*'); let {data:s} = await supabase.from('staff').select('*'); products = p || []; categories = (c || []).map(i => i.name); staff = s || []; } function formatCurrency(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v); } async function loginAdmin() { const u = prompt("Usuário:"); if(!u) return; const p = prompt("Senha:"); if(p === '929130ab#') { document.body.classList.add('admin-mode'); currentUser = u; document.getElementById('admin-greeting').innerText = `Logado como: ${u}`; renderAdmin(); } } function logoutAdmin() { document.body.classList.remove('admin-mode'); } async function addCategory() { const name = document.getElementById('new-cat-name').value; if(!name) return; await supabase.from('categories').insert([{name}]); await loadData(); renderProducts(); renderAdmin(); } async function addStaff() { const name = document.getElementById('staff-name').value; if(!name) return; await supabase.from('staff').insert([{full_name: name, login: name.toLowerCase().split(' ')[0]}]); await loadData(); renderAdmin(); } document.getElementById('admin-form').onsubmit = async (e) => { e.preventDefault(); const id = document.getElementById('edit-product-id').value; const payload = { name: document.getElementById('new-p-name').value, price: parseFloat(document.getElementById('new-p-price').value), category: document.getElementById('new-p-cat').value, desc: document.getElementById('new-p-desc').value, images: document.getElementById('image-links').value.split(',').map(l => l.trim()), stock: true }; if(id) { await supabase.from('products').update(payload).eq('id', id); } else { await supabase.from('products').insert([payload]); } clearForm(); await loadData(); renderProducts(); renderAdmin(); }; function clearForm() { document.getElementById('admin-form').reset(); document.getElementById('edit-product-id').value = ''; } function renderAdmin() { const catSelect = document.getElementById('new-p-cat'); catSelect.innerHTML = '<option value="">Categoria *</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join(''); } function renderProducts() { const grid = document.getElementById('product-grid'); const nav = document.getElementById('dynamic-nav'); const term = document.getElementById('search-input').value.toLowerCase(); let filtered = products.filter(p => (currentFilter === 'Todos' || p.category === currentFilter) && (p.name.toLowerCase().includes(term))); const allCats = ['Todos', ...categories]; nav.innerHTML = allCats.map(c => `<button onclick="currentFilter='${c}';renderProducts()" class="category-pill px-6 py-3 rounded-xl whitespace-nowrap font-bold text-sm ${currentFilter === c ? 'active' : 'bg-zinc-800'}">${c}</button>`).join(''); grid.innerHTML = filtered.map(p => ` <div class="product-card bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden relative group"> <div class="admin-only absolute top-2 left-2 flex gap-2 z-10"> <button onclick="editProduct(${p.id})" class="bg-blue-600 p-2 rounded"><i class="fas fa-edit"></i></button> <button onclick="deleteProduct(${p.id})" class="bg-red-600 p-2 rounded"><i class="fas fa-trash"></i></button> </div> <img src="${p.images[0]}" onclick="openProductModal(${p.id})" class="w-full h-56 object-cover cursor-pointer"> <div class="p-5"> <span class="text-[10px] font-black text-mixbarato uppercase">${p.category}</span> <h3 class="font-bold text-lg text-white mt-1">${p.name}</h3> <p class="text-2xl font-black text-white mt-4">${formatCurrency(p.price)}</p> <button onclick="addToCart(${p.id})" class="w-full btn-primary text-black font-black py-3 rounded-xl mt-4 uppercase">Adicionar</button> </div> </div> `).join(''); } async function deleteProduct(id) { if(confirm('Excluir?')) { await supabase.from('products').delete().eq('id', id); await loadData(); renderProducts(); } } function editProduct(id) { const p = products.find(i => i.id === id); document.getElementById('edit-product-id').value = p.id; document.getElementById('new-p-name').value = p.name; document.getElementById('new-p-price').value = p.price; document.getElementById('new-p-cat').value = p.category; document.getElementById('new-p-desc').value = p.desc; document.getElementById('image-links').value = p.images.join(', '); window.scrollTo(0,0); } function openProductModal(id) { const p = products.find(i => i.id === id); document.getElementById('modal-product-name').innerText = p.name; document.getElementById('modal-product-price').innerText = formatCurrency(p.price); document.getElementById('modal-product-desc').innerText = p.desc; const container = document.getElementById('carousel-container'); container.innerHTML = p.images.map((img, i) => `<div class="carousel-slide ${i === 0 ? 'active' : ''}"><img src="${img}"></div>`).join(''); document.getElementById('product-modal').classList.remove('hidden'); } function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); } function addToCart(id) { const p = products.find(i => i.id === id); const ex = cart.find(i => i.id === id); if(ex) ex.quantity++; else cart.push({...p, quantity: 1}); updateCart(); } function updateCart() { const count = cart.reduce((a, b) => a + b.quantity, 0); const total = cart.reduce((a, b) => a + (b.price * b.quantity), 0); document.getElementById('cart-count').innerText = count; document.getElementById('cart-total-badge').innerText = formatCurrency(total); document.getElementById('cart-total-modal').innerText = formatCurrency(total); document.getElementById('cart-button').classList.toggle('hidden', count === 0); } function openCart() { const items = document.getElementById('cart-items'); items.innerHTML = cart.map(i => ` <div class="flex justify-between items-center bg-zinc-800 p-4 rounded-xl"> <div><p class="font-bold">${i.name}</p><p class="text-xs text-zinc-500">${i.quantity}x ${formatCurrency(i.price)}</p></div> <p class="font-black">${formatCurrency(i.price * i.quantity)}</p> </div> `).join(''); document.getElementById('cart-modal').classList.remove('hidden'); } function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); } function sendOrder() { let msg = `*🛍️ PEDIDO MIXBARATO*%0A%0A`; cart.forEach(i => msg += `• ${i.quantity}x ${i.name}%0A`); msg += `%0A*TOTAL: ${formatCurrency(cart.reduce((a,b)=>a+(b.price*b.quantity),0))}*%0A*Obs:* ${document.getElementById('order-notes').value}`; window.open(`https://wa.me/5521987537876?text=${msg}`); } init();</script></body></html>
